# Optional Fly.io config. From repo root after `fly auth login`:
#   fly launch --no-deploy --copy-config
#   fly deploy
# App name may need to be unique — change `app` below if taken.

app = "diaoleme-ai-proxy"
primary_region = "sin"

[build]
  dockerfile = "backend/Dockerfile"

[env]
  NODE_ENV = "production"

[http_service]
  internal_port = 8787
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "20s"
    method = "GET"
    path = "/api/health"
