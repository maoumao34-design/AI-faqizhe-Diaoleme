# Render Blueprint — one-click from Dashboard: New → Blueprint → this repo
# Docs: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: diaoleme-ai-proxy
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      # Optional — leave empty for mock/fallback demo; set for real AI
      - key: AI_PROVIDER
        value: siliconflow
      - key: SILICONFLOW_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
